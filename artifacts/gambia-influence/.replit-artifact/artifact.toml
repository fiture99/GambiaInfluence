kind = "web"
previewPath = "/"
title = "GambiaInfluence"
version = "1.0.0"
id = "artifacts/gambia-influence"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24214

[services.development]
run = "pnpm --filter @workspace/gambia-influence run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gambia-influence", "run", "build" ]
publicDir = "artifacts/gambia-influence/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24214"
BASE_PATH = "/"
